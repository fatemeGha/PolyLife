# PolyLife — per-team API gateway (nginx).
#
# Each team runs this gateway in front of its own frontend and backend. Every
# request to the team API is first authenticated against the PolyLife core via
# nginx's `auth_request` (forward-auth). On success the core returns the user's
# identity in X-User-* headers, which the gateway forwards to the team backend —
# so a team never has to decode JWTs itself.
#
# Upstreams (`core`, `backend`, `frontend`) are service names on the shared
# `polylife_net` Docker network. Adjust ports to match your stack.

server {
    listen 80;

    # --- Forward-auth subrequest: ask the core "is this request authenticated?"
    location = /_auth {
        internal;
        proxy_pass              http://core:8000/api/verify;
        proxy_pass_request_body off;                 # body not needed for auth
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        # Forward the caller's credentials so the core can validate the JWT.
        proxy_set_header        Authorization $http_authorization;
        proxy_set_header        Cookie $http_cookie;
    }

    # --- Team API: protected by the core ---
    location /api/ {
        auth_request /_auth;

        # Capture the identity the core returned and pass it to the backend.
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_name $upstream_http_x_user_username;
        proxy_set_header X-User-Id       $user_id;
        proxy_set_header X-User-Username $user_name;

        proxy_pass         http://backend:8000;   # this team's backend
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Everything else: this team's frontend ---
    location / {
        proxy_pass        http://frontend:80;     # this team's frontend
        proxy_set_header  Host $host;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # When the core denies the request, send the user to the core login page.
    error_page 401 = @needs_login;
    location @needs_login {
        return 302 http://localhost:8000/login;
    }
}
