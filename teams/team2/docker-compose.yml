version: "3.9"

# ---------------------------------------------------------------------------
# Team2 microservice stack
#
# Services:
#   team2_backend   — Django application server
#   team2_worker    — Celery worker (processes reminder tasks)
#   team2_beat      — Celery Beat (periodic task scheduler)
#   team2_redis     — Redis broker + result backend
#   team2_gateway   — Nginx reverse proxy
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # MongoDB — Primary Database for Team2
  # --------------------------------------------------------------------------
  db:
    image: mongo:6.0
    container_name: team2_db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - team2_mongo_data:/data/db
    networks:
      - polylife_net
      
  # --------------------------------------------------------------------------
  # Redis — Message broker for Celery + session/cache store
  # --------------------------------------------------------------------------
  team2_redis:
    image: redis:7-alpine
    container_name: team2_redis
    restart: unless-stopped
    ports:
      - "6382:6379"       # Exposed on 6382 to avoid conflicts with other teams
    volumes:
      - team2_redis_data:/data
    networks:
      - polylife_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Django Backend
  # --------------------------------------------------------------------------
  team2_backend:
    build:
      context: ../../         # project root (for COPY . /app/)
      dockerfile: teams/team2/Dockerfile
    container_name: team2_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ../../.env
    environment:
      - CELERY_BROKER_URL=redis://team2_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://team2_redis:6379/1
      - URL_BASE_CORE=http://core:8000
    volumes:
      - ../../:/app/
    depends_on:
      team2_redis:
        condition: service_healthy
    networks:
      - polylife_net
    ports:
      - "8002:8000"
  # --------------------------------------------------------------------------
  # Celery Worker — Processes queued tasks (reminder notifications)
  # --------------------------------------------------------------------------
  team2_worker:
    build:
      context: ../../
      dockerfile: teams/team2/Dockerfile
    container_name: team2_worker
    restart: unless-stopped
    command: >
      celery -A teams.team2.config worker
        --loglevel=info
        --concurrency=4
        --queues=team2_reminders,celery
        --hostname=team2_worker@%h
    env_file:
      - ../../.env
    environment:
      - CELERY_BROKER_URL=redis://team2_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://team2_redis:6379/1
    volumes:
      - ../../:/app/
    depends_on:
      team2_redis:
        condition: service_healthy
      team2_backend:
        condition: service_started
    networks:
      - polylife_net

  # --------------------------------------------------------------------------
  # Celery Beat — Periodic task scheduler (uses DB scheduler)
  # --------------------------------------------------------------------------
  team2_beat:
    build:
      context: ../../
      dockerfile: teams/team2/Dockerfile
    container_name: team2_beat
    restart: unless-stopped
    command: >
      celery -A teams.team2.config beat
        --loglevel=info
    env_file:
      - ../../.env
    environment:
      - CELERY_BROKER_URL=redis://team2_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://team2_redis:6379/1
    volumes:
      - ../../:/app/
    depends_on:
      team2_redis:
        condition: service_healthy
      team2_backend:
        condition: service_started
    networks:
      - polylife_net

  # --------------------------------------------------------------------------
  # Nginx Gateway — Entry point for all team2 API requests
  # --------------------------------------------------------------------------
  team2_gateway:
    image: nginx:alpine
    container_name: team2_gateway
    restart: unless-stopped
    ports:
      - "9102:80"      # team2 is accessible at http://localhost:9102
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - team2_backend
    networks:
      - polylife_net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  team2_redis_data:
    driver: local
  # Add the MongoDB persistent volume
  team2_mongo_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks — shared across all team stacks
# ---------------------------------------------------------------------------
networks:
  polylife_net:
    external: true

