# Team team7 — microservice stack.  Run from this folder:  docker compose up --build
#
# Prerequisite: the PolyLife core must already be running (it owns the shared
# `polylife_net` network that the gateway uses to reach the core).
#
# Three containers:
#   db      -> this team's OWN database (isolated, with its own password)
#   app     -> this team's service (frontend + backend together) on port 8000
#   gateway -> nginx; authenticates every /api/ request against the core,
#              then proxies to the app.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: team7
      POSTGRES_USER: team7_user
      POSTGRES_PASSWORD: "plf_team7_T4v7Gx"   # <-- this team's unique DB password (dev only)
    volumes:
      - db-data:/var/lib/postgresql/data
    networks: [team]

  app:
    build: ./app
    environment:
      # Your service talks to its OWN database with these credentials.
      DATABASE_URL: "postgres://team7_user:plf_team7_T4v7Gx@db:5432/team7"
    depends_on: [db]
    networks: [team]

  gateway:
    image: nginx:alpine
    ports:
      - "9107:80"          # open in the browser:  http://localhost:9107
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [team, polylife]

volumes:
  db-data:

networks:
  team:                        # private: app <-> db only
  polylife:                    # shared with the core: gateway <-> core
    external: true
    name: polylife_net
