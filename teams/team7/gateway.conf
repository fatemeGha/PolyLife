# Team team7 gateway (nginx).
# Authenticates against the PolyLife core, then proxies to this team's app.
server {
    listen 80;

    # Ask the core whether the request is authenticated (forward-auth).
    location = /_auth {
        internal;
        proxy_pass              http://core:8000/api/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Authorization $http_authorization;
        proxy_set_header        Cookie $http_cookie;
    }

    # Protected API: only reaches the app if the core says "OK".
    location /api/ {
        auth_request /_auth;
        # Pass the identity the core returned on to the app.
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_name $upstream_http_x_user_username;
        proxy_set_header X-User-Id       $user_id;
        proxy_set_header X-User-Username $user_name;

        proxy_pass       http://app:8000;
        proxy_set_header Host $host;
    }

    # Public: the team's UI.
    location / {
        proxy_pass       http://app:8000;
        proxy_set_header Host $host;
    }

    # If the core rejects the request, send the user to the core login page.
    error_page 401 = @needs_login;
    location @needs_login { return 302 http://localhost:8000/login; }
}
