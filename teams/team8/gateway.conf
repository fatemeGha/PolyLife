# Team 8 Nginx gateway. JWT stays in Core; the backend receives trusted identity
# only through X-User-Id and X-User-Username.
map $http_x_forwarded_proto $team8_forwarded_proto {
    default $scheme;
    https https;
}

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s;
    client_max_body_size 210m;

    location = /_auth {
        internal;
        set $core_verify ${URL_BASE_CORE}/api/verify;
        proxy_pass              $core_verify;
        proxy_method            GET;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Authorization $http_authorization;
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        X-Original-URI $request_uri;
    }

    location = /auth/logout {
        set $core_logout ${URL_BASE_CORE}/api/logout;
        proxy_pass              $core_logout;
        proxy_method            POST;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        Authorization $http_authorization;
    }

    location /api/ {
        auth_request /_auth;
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_name $upstream_http_x_user_username;
        proxy_set_header X-User-Id       $user_id;
        proxy_set_header X-User-Username $user_name;
        proxy_set_header X-Gateway-Secret "${GATEWAY_SHARED_SECRET}";

        set $backend http://backend:8000;
        proxy_pass       $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $team8_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location /media/ {
        rewrite ^/media/(.*)$ /$1 break;
        set $storage http://minio:9000;
        proxy_pass $storage;
        proxy_set_header Host minio:9000;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location = /health/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location / {
        set $backend http://backend:8000;
        proxy_pass       $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $team8_forwarded_proto;
    }

    error_page 401 = @api_unauthorized;
    location @api_unauthorized {
        default_type application/json;
        return 401 '{"success":false,"code":"authentication_required","message":"برای ادامه ابتدا وارد حساب PolyLife شوید."}';
    }
}
