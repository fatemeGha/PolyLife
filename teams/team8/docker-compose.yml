# Team 8 — Social Network + LMS development stack.
# Secrets and ports come exclusively from .env.
services:
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${TEAM_PORT}:80"
    volumes:
      - ./gateway.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      URL_BASE_CORE: ${URL_BASE_CORE}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET}
      NGINX_ENVSUBST_FILTER: URL_BASE_CORE|GATEWAY_SHARED_SECRET
    networks: [polylife, team]
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ../..
      dockerfile: teams/team8/Dockerfile
    restart: unless-stopped
    env_file: .env
    networks: [polylife, team]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes: [db-data:/var/lib/postgresql/data]
    networks: [polylife, team]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes: [redis-data:/data]
    networks: [polylife, team]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    volumes: [minio-data:/data]
    networks: [polylife, team]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    env_file: .env
    networks: [polylife, team]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$AWS_STORAGE_BUCKET_NAME;
      mc anonymous set download local/$$AWS_STORAGE_BUCKET_NAME;
      "

volumes:
  db-data:
  redis-data:
  minio-data:

networks:
  polylife:
    external: true
    name: polylife_net
  team:
    internal: true
