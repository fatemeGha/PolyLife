version: '3.8'

services:
  gateway:
    build: .
    ports:
      - "${TEAM_PORT:-8000}:80"
    networks:
      - polylife
    restart: always

  database:
    image: postgres:16-alpine
    container_name: team6_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team6_db}
      POSTGRES_USER: ${POSTGRES_USER:-team6_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team6_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - polylife

  backend:
    build:
      context: ./teams/team6
      dockerfile: Dockerfile
    container_name: team6_backend
    restart: always
    environment:
      - DB_HOST=database
      - DB_NAME=${POSTGRES_DB:-team6_db}
      - DB_USER=${POSTGRES_USER:-team6_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-team6_password}
      - DB_PORT=5432
    depends_on:
      - database
    networks:
      - polylife

volumes:
  postgres_data:

networks:
  polylife:
    driver: bridge